<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Festt</title>
    <meta name="description" content="Acesse todos os links e redes sociais do @festtrpm">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="links.css">
</head>
<body class="links-page">
    <!-- Reutilizando o background dark/tech da home -->
    <div class="hero-bg links-bg">
        <img src="assets/hero_bg.png" alt="Bancada tech real">
        <div class="overlay"></div>
        <div class="grid-overlay"></div>
    </div>
    
    <div class="links-container">
        <!-- Perfil -->
        <div class="profile-section">
            <div class="profile-image-container">
                <div class="profile-avatar">
                    <span class="glitch-icon">/></span>
                </div>
            </div>
            <h1 class="profile-name logo-text" data-text="@festtrpm">@festtrpm</h1>
            <p class="profile-bio">> STATUS: ONLINE</p>
        </div>

        <!-- Lista de Links -->
        <div class="links-list">
            <a href="https://youtube.com/@festtrpm" target="_blank" class="link-btn youtube-btn">
                <span class="link-title">YouTube</span>
                <span class="link-desc">Investigações e Experimentos</span>
            </a>
            
            <a href="https://instagram.com/andrel.batista" target="_blank" class="link-btn instagram-btn">
                <span class="link-title">Instagram</span>
                <span class="link-desc">@andrel.batista</span>
            </a>
            
            <a href="https://livepix.gg/festtrpm" target="_blank" class="link-btn livepix-btn">
                <span class="link-title">Apoie no LivePix</span>
                <span class="link-desc">livepix.gg/festtrpm</span>
            </a>
            
            <a href="index.html" class="link-btn website-btn">
                <span class="link-title">Acessar o Site</span>
                <span class="link-desc">Explorar arquivos da bancada</span>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
